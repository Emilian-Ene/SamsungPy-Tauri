name: Samsung MCD Build
run-name: Samsung MCD Build #${{ github.run_number }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      VITE_CLOUD_BASE_URL: ${{ secrets.VITE_CLOUD_BASE_URL }}
      VITE_CLOUD_API_KEY: ${{ secrets.VITE_CLOUD_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tauri-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: tauri-app
        run: npm ci --include=dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build bundled Python bridge
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller
          python tauri-app/py/export_cli_catalog.py
          rm -rf tauri-app/py/build tauri-app/py/dist
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --onefile \
            --name bridge \
            --distpath tauri-app/py/dist \
            --workpath tauri-app/py/build \
            tauri-app/py/bridge.py
          mkdir -p tauri-app/py/bridge_runtime
          cp tauri-app/py/dist/bridge.exe tauri-app/py/bridge_runtime/bridge.exe

      - name: Verify bundled bridge runtime
        shell: bash
        run: |
          tauri-app/py/bridge_runtime/bridge.exe cli_catalog '{}' > tauri-app/py/bridge_runtime/bridge_smoke.json
          python - <<'PY'
          import json
          from pathlib import Path

          smoke_file = Path('tauri-app/py/bridge_runtime/bridge_smoke.json')
          payload = json.loads(smoke_file.read_text(encoding='utf-8'))
          if not payload.get('ok'):
              raise SystemExit(f"bridge smoke failed: {payload}")
          commands = payload.get('data', {}).get('commands', [])
          if not isinstance(commands, list) or len(commands) == 0:
              raise SystemExit('bridge smoke failed: empty command catalog')
          print(f"bridge smoke ok, commands={len(commands)}")
          PY

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Verify Rust toolchain
        run: |
          rustc --version
          cargo --version

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          npm pkg get version --prefix tauri-app \
            | tr -d '"' \
            | awk '{print "version=v"$0}' >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        working-directory: tauri-app
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Rename portable EXE
        shell: bash
        run: |
          exe_file="$(find tauri-app/src-tauri/target/x86_64-pc-windows-msvc/release -maxdepth 1 -type f -name '*.exe' | head -n 1)"
          if [ -z "$exe_file" ]; then
            echo "Portable EXE not found"
            exit 1
          fi
          cp "$exe_file" "tauri-app/src-tauri/target/x86_64-pc-windows-msvc/release/Samsung_MCD_${{ steps.app_version.outputs.version }}_portable.exe"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Samsung_MCD_${{ steps.app_version.outputs.version }}
          path: |
            tauri-app/src-tauri/target/x86_64-pc-windows-msvc/release/Samsung_MCD_${{ steps.app_version.outputs.version }}_portable.exe
            tauri-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            tauri-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
